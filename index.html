<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff6a00, #ee0979);
    color: white;
    text-align: center;
  }

  .card {
    background: rgba(255, 255, 255, 0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  button {
    font-size: 26px;
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:active {
    transform: scale(1.2);
  }

  .contador {
    font-size: 40px;
    margin-top: 20px;
    transition: 0.3s;
  }

  .pop {
    transform: scale(1.3);
    color: yellow;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Meu App ❤️</h1>

  <button onclick="curtir()">Gostei 👍</button>

  <div class="contador" id="contador">0</div>
</div>

<script>
  let total = parseInt(localStorage.getItem("curtidas")) || 0;
  const contador = document.getElementById("contador");

  contador.innerText = total;

  function curtir() {
    total++;
    localStorage.setItem("curtidas", total);

    contador.innerText = total;

    // animação
    contador.classList.add("pop");
    setTimeout(() => {
      contador.classList.remove("pop");
    }, 200);
  }
</script>

</body>
</html>
