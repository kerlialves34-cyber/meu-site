<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
    font-size: 22px; /* 🔥 aumenta o texto */
  }

  button {
    font-size: 24px;      /* 🔥 botão maior */
    padding: 15px 25px;   /* 🔥 botão mais “grosso” */
    cursor: pointer;
    border-radius: 10px;
  }

  p {
    font-size: 28px; /* 🔥 contador maior */
  }
</style>
</head>

<body>

<button onclick="curtir()">Gostei 👍</button>
<p>Curtidas: <span id="contador"></span></p>

<script>
  let total = parseInt(localStorage.getItem("curtidas")) || 0;
  document.getElementById("contador").innerText = total;

  function curtir() {
    total++;
    localStorage.setItem("curtidas", total);
    document.getElementById("contador").innerText = total;
  }
</script>

</body>
</html>
